<div class="app-container">
  <!-- Navbar visible except on login/register -->
  <app-navbar *ngIf="!isAuthPage()" (toggleSidebar)="toggleSidebar()"></app-navbar>

  <div class="app-body" [class.sidebar-open]="isSidebarOpen">
    <!-- Overlay for mobile closing -->
    <div *ngIf="isSidebarOpen" class="sidebar-overlay" (click)="closeSidebar()"></div>

    <!-- Sidebar visible except on login/register -->
    <app-sidebar *ngIf="!isAuthPage()"></app-sidebar>

    <main class="main-content d-flex flex-column h-100">
      <div class="flex-grow-1">
        <router-outlet></router-outlet>
      </div>

      <!-- Global Footer for Modules -->
      <footer *ngIf="!isAuthPage()" class="p-3 mt-auto">
        <div class="text-center">
          <div style="font-size: 0.75rem; letter-spacing: 0.5px">
            <span class="fw-bold text-primary">v1.8.6</span>
            <span class="mx-2 text-muted">|</span>
            <span class="text-secondary-emphasis fw-bold">Piridawly Software &copy; 2026</span>
          </div>
        </div>
      </footer>
    </main>
  </div>
</div>
